<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NNS" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" id="apple-touch-icon"/>
    <script>
      (function() {
        var path = window.location.pathname;
        var el = document.getElementById('apple-touch-icon');
        if (path.startsWith('/agent')) {
          el.href = '/icon-agent-192.png';
          document.title = 'NNS Đại lý';
        } else if (path.startsWith('/admin')) {
          el.href = '/icon-admin-192.png';
          document.title = 'NNS Admin';
        }
      })();
    </script>

    <!-- SEO / Social -->
    <meta name="description" content="Theo dõi giá cà phê Lâm Đồng, tìm đại lý gần bạn và hỏi đáp nông nghiệp cùng AgriBot." />
    <meta property="og:title" content="NNS — Giá cà phê Lâm Đồng" />
    <meta property="og:description" content="Giá cà phê realtime, đại lý gần bạn, trợ lý AgriBot." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nns.id.vn" />

    <title>NNS — Giá cà phê Lâm Đồng</title>
  </head>
  <style>body { margin: 0; }</style>
  <body>
    <div id="root">
      <script>
        (function(){
          var path = window.location.pathname;
          var style = '<style>@keyframes pulse {0%, 100% {transform: scale(1); opacity:1} 50% {transform: scale(1.05); opacity:0.85}}</style>';
          var html = '';
          if (path.startsWith('/agent')) {
            document.body.style.backgroundColor = '#0d47a1';
            html = '<div style="min-height:100dvh; background:#0d47a1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:\'Be Vietnam Pro\',sans-serif">' +
                   style +
                   '<img src="/icon-agent-192.png" alt="NNS Agent" style="width:96px;height:96px;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:pulse 1.5s infinite; background:#fff" />' +
                   '<div style="font-size:26px; font-weight:800; color:#fff; margin-top:24px">NNS Đại lý</div>' +
                   '<div style="font-size:14px; color:rgba(255,255,255,0.7); margin-top:6px">Cổng quản lý đại lý cà phê</div>' +
                   '</div>';
          } else if (path.startsWith('/admin')) {
            document.body.style.backgroundColor = '#fff8f0';
            html = '<div style="min-height:100dvh; background:#fff8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:\'Be Vietnam Pro\',sans-serif">' +
                   style +
                   '<img src="/icon-admin-192.png" alt="NNS Admin" style="width:96px;height:96px;border-radius:24px;box-shadow:0 8px 24px rgba(230,81,0,.2);animation:pulse 1.5s infinite; background:#fff" />' +
                   '<div style="font-size:26px; font-weight:800; color:#e65100; margin-top:24px">NNS Admin</div>' +
                   '<div style="font-size:14px; color:#888; margin-top:6px">Trung tâm điều hành NNS</div>' +
                   '</div>';
          } else {
            document.body.style.backgroundColor = '#f2f7f2';
            html = '<div style="min-height:100dvh; background:#f2f7f2; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:\'Be Vietnam Pro\',sans-serif">' +
                   style +
                   '<img src="/icon-192.png" alt="NNS" style="width:96px;height:96px;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:pulse 1.5s infinite; background:#fff" />' +
                   '<div style="font-size:26px; font-weight:800; color:#2e7d32; margin-top:24px">NNS</div>' +
                   '<div style="font-size:14px; color:#4a6e4a; margin-top:6px">Giá cà phê Lâm Đồng</div>' +
                   '</div>';
          }
          document.write(html);
        })();
      </script>
    </div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[NNS] SW registered:', reg.scope))
            .catch(err => console.warn('[NNS] SW failed:', err))
        })
      }
    </script>
  </body>
</html>
